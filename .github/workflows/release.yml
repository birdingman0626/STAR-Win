name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v2.7.11b-win1). Leave empty to just build artifacts.'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact_name: STAR-linux-x86_64
            artifact_path: source/build/STAR

          - os: windows-latest
            name: Windows
            artifact_name: STAR-windows-x86_64
            artifact_path: source/build/STAR.exe

          - os: macos-latest
            name: macOS
            artifact_name: STAR-macos-x86_64
            artifact_path: source/build/STAR

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ---- Linux ----
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # ---- macOS ----
      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc ninja
          # Resolve exact versioned paths (e.g. g++-15, gcc-15)
          GCC_BIN=$(ls $(brew --prefix gcc)/bin/g++-* | sort -V | tail -1)
          GCC_VER=$(basename "$GCC_BIN" | grep -oE '[0-9]+$')
          echo "GCC_BIN=${GCC_BIN}" >> $GITHUB_ENV
          echo "GCC_C_BIN=$(brew --prefix gcc)/bin/gcc-${GCC_VER}" >> $GITHUB_ENV

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd source
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${GCC_C_BIN}" \
            -DCMAKE_CXX_COMPILER="${GCC_BIN}"
          cmake --build build

      # ---- Windows ----
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # ---- Smoke test & upload ----
      - name: Smoke test (Unix)
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.artifact_path }} --version

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        run: source\build\STAR.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  # Create a GitHub Release only when triggered by a tag or an explicit tag_name input
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            STAR-linux-x86_64
            STAR-windows-x86_64.exe
            STAR-macos-x86_64

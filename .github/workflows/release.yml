name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Override release tag (e.g. v2.7.11c_abc1234). Leave empty to auto-generate from commit.'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux

          - os: windows-latest
            name: Windows

          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ---- Linux ----
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp source/build/STAR STAR-linux-x86_64
          chmod +x STAR-linux-x86_64

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-linux-x86_64
          path: STAR-linux-x86_64

      # ---- macOS ----
      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc ninja
          GCC_BIN=$(ls $(brew --prefix gcc)/bin/g++-* | sort -V | tail -1)
          GCC_VER=$(basename "$GCC_BIN" | grep -oE '[0-9]+$')
          echo "GCC_BIN=${GCC_BIN}" >> $GITHUB_ENV
          echo "GCC_C_BIN=$(brew --prefix gcc)/bin/gcc-${GCC_VER}" >> $GITHUB_ENV

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd source
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${GCC_C_BIN}" \
            -DCMAKE_CXX_COMPILER="${GCC_BIN}"
          cmake --build build

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp source/build/STAR STAR-macos-aarch64
          chmod +x STAR-macos-aarch64

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-macos-aarch64
          path: STAR-macos-aarch64

      # ---- Windows ----
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Staging directory
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item source\build\STAR.exe staging\

          # Copy MSVC CRT DLLs (msvcp140, vcruntime140, etc.)
          $redistDir = $env:VCToolsRedistDir
          if ($redistDir) {
            $crtDir = Join-Path $redistDir "x64\Microsoft.VC143.CRT"
            if (-not (Test-Path $crtDir)) {
              $crtDir = Get-ChildItem (Join-Path $redistDir "x64") -Filter "Microsoft.VC*.CRT" |
                        Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
            }
            if ($crtDir -and (Test-Path $crtDir)) {
              Copy-Item "$crtDir\msvcp140.dll"      staging\ -ErrorAction SilentlyContinue
              Copy-Item "$crtDir\vcruntime140.dll"  staging\ -ErrorAction SilentlyContinue
              Copy-Item "$crtDir\vcruntime140_1.dll" staging\ -ErrorAction SilentlyContinue
            }
          }

          # Copy OpenMP runtime (vcomp*.dll)
          $ompDll = Get-ChildItem "$env:VCToolsRedistDir\x64" -Recurse -Filter "vcomp*.dll" -ErrorAction SilentlyContinue |
                    Sort-Object Name -Descending | Select-Object -First 1
          if ($ompDll) {
            Copy-Item $ompDll.FullName staging\
          }

          # Show what's in the package
          Write-Host "=== Package contents ==="
          Get-ChildItem staging\ | Format-Table Name, Length

          # Zip it up
          Compress-Archive -Path staging\* -DestinationPath STAR-windows-x86_64.zip

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        run: staging\STAR.exe --version

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-windows-x86_64
          path: STAR-windows-x86_64.zip

      # ---- Smoke test (Unix) ----
      - name: Smoke test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./STAR-linux-x86_64 --version

      - name: Smoke test (macOS)
        if: matrix.os == 'macos-latest'
        run: ./STAR-macos-aarch64 --version

  # Always create a GitHub Release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=2.7.11c_${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: STAR ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            STAR-linux-x86_64
            STAR-windows-x86_64.zip
            STAR-macos-aarch64

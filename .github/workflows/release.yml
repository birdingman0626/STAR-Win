name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v2.7.11c). Leave blank to auto-generate from commit hash.'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTAR_BUILD_TESTS=ON
          cmake --build build

      - name: Unit tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ctest --test-dir source/build/test --output-on-failure -j4

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp source/build/STAR STAR-linux-x86_64
          chmod +x STAR-linux-x86_64

      - name: Smoke test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./STAR-linux-x86_64 --version

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-linux-x86_64
          path: STAR-linux-x86_64

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc ninja
          GCC_BIN=$(ls $(brew --prefix gcc)/bin/g++-* | sort -V | tail -1)
          GCC_VER=$(basename "$GCC_BIN" | grep -oE '[0-9]+$')
          echo "GCC_BIN=${GCC_BIN}"       >> $GITHUB_ENV
          echo "GCC_C_BIN=$(brew --prefix gcc)/bin/gcc-${GCC_VER}" >> $GITHUB_ENV

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd source
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${GCC_C_BIN}" \
            -DCMAKE_CXX_COMPILER="${GCC_BIN}" \
            -DSTAR_BUILD_TESTS=ON
          cmake --build build

      - name: Unit tests (macOS)
        if: matrix.os == 'macos-latest'
        run: ctest --test-dir source/build/test --output-on-failure -j4

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp source/build/STAR STAR-macos-aarch64
          chmod +x STAR-macos-aarch64

      - name: Smoke test (macOS)
        if: matrix.os == 'macos-latest'
        run: ./STAR-macos-aarch64 --version

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-macos-aarch64
          path: STAR-macos-aarch64

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTAR_BUILD_TESTS=ON
          cmake --build build

      - name: Unit tests (Windows)
        if: matrix.os == 'windows-latest'
        run: ctest --test-dir source/build/test --output-on-failure -j4

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item source\build\STAR.exe staging\

          # Bundle MSVC CRT and OpenMP DLLs
          $redistDir = $env:VCToolsRedistDir
          if ($redistDir) {
            $crtDir = Join-Path $redistDir "x64\Microsoft.VC143.CRT"
            if (-not (Test-Path $crtDir)) {
              $crtDir = Get-ChildItem (Join-Path $redistDir "x64") -Filter "Microsoft.VC*.CRT" |
                        Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
            }
            if ($crtDir -and (Test-Path $crtDir)) {
              foreach ($dll in @("msvcp140.dll","vcruntime140.dll","vcruntime140_1.dll")) {
                Copy-Item "$crtDir\$dll" staging\ -ErrorAction SilentlyContinue
              }
            }
            $ompDll = Get-ChildItem "$redistDir\x64" -Recurse -Filter "vcomp*.dll" -ErrorAction SilentlyContinue |
                      Sort-Object Name -Descending | Select-Object -First 1
            if ($ompDll) { Copy-Item $ompDll.FullName staging\ }
          }

          Get-ChildItem staging\ | Format-Table Name, Length
          Compress-Archive -Path staging\* -DestinationPath STAR-windows-x86_64.zip

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        run: staging\STAR.exe --version

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-windows-x86_64
          path: STAR-windows-x86_64.zip

  # ── Publish release (only after all three builds + tests pass) ────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=2.7.11c_${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: STAR ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            STAR-linux-x86_64
            STAR-windows-x86_64.zip
            STAR-macos-aarch64

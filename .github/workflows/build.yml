name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev ninja-build

      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: sudo apt-get install -y clang

      - name: Build with CMake
        run: |
          cd source
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Smoke test
        run: |
          ./source/build/STAR --version
          echo "Version check passed"

      - name: Upload artifact
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: STAR-linux-x86_64
          path: source/build/STAR

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gcc ninja
          # Resolve exact versioned paths (e.g. g++-15, gcc-15)
          GCC_BIN=$(ls $(brew --prefix gcc)/bin/g++-* | sort -V | tail -1)
          GCC_VER=$(basename "$GCC_BIN" | grep -oE '[0-9]+$')
          echo "GCC_BIN=${GCC_BIN}" >> $GITHUB_ENV
          echo "GCC_C_BIN=$(brew --prefix gcc)/bin/gcc-${GCC_VER}" >> $GITHUB_ENV

      - name: Build with CMake
        run: |
          cd source
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${GCC_C_BIN}" \
            -DCMAKE_CXX_COMPILER="${GCC_BIN}"
          cmake --build build

      - name: Smoke test
        run: ./source/build/STAR --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: STAR-macos-x86_64
          path: source/build/STAR

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build with CMake (Ninja)
        run: |
          cd source
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Smoke test
        run: source\build\STAR.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: STAR-windows-x86_64
          path: source\build\STAR.exe
